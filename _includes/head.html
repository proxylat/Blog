<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% if page.title %}{{ page.title | escape }} | {{ site.title | escape }}{% else %}{{ site.title | escape }}{% endif %}</title>
  <meta name="description" content="{% if page.excerpt %}{{ page.excerpt | strip_html | strip_newlines | truncate: 160 | escape }}{% else %}{{ site.description | escape }}{% endif %}">
  <meta name="color-scheme" content="dark light">

  <link rel="preload" href="{{ '/font/CPMono_v07_Plain.woff2' | relative_url }}" as="font" type="font/woff2" crossorigin="anonymous" fetchpriority="high">
  <script>
    !function () {
      const d = document,
            r = d.documentElement,
            k = 'theme',
            s = t => {
              r.classList.toggle('dark-theme', t === 'dark');
              r.style.colorScheme = t;
              try { localStorage.setItem(k, t) } catch (_) {}
            };

      let t = 'light';
      try { t = localStorage.getItem(k) || 'light' } catch (_) {}
      s(t);

      d.addEventListener('DOMContentLoaded', () => {
        const b = d.getElementById('themeToggle');
        if (!b) return;
        b.setAttribute('aria-pressed', r.classList.contains('dark-theme'));
        b.onclick = () => {
          t = r.classList.contains('dark-theme') ? 'light' : 'dark';
          s(t);
          b.setAttribute('aria-pressed', t === 'dark');
        };
      });
    }();
  </script>
  <link rel="stylesheet" href="{{ "/css/main.css" | relative_url }}">
  <link rel="icon" href="{{ 'imgs/favicon.ico' | relative_url }}">
  {% if site.url != "" %}<link rel="canonical" href="{{ site.url | append: page.url }}">{% endif %}
  
  <meta property="og:site_name" content="{{ site.title | escape }}">
  <meta property="og:title" content="{{ page.title | default: site.title | escape }}">
  <meta property="og:type" content="{% if page.layout == 'post' %}article{% else %}website{% endif %}">
  <meta property="og:description" content="{% if page.description %}{{ page.description | escape }}{% else %}{{ page.excerpt | strip_html | strip_newlines | truncate: 160 | default: site.description | escape }}{% endif %}">
  <meta property="og:url" content="{{ site.url }}{{ page.url }}">
  <meta property="og:image" content="{{ site.url }}{{ '/imgs/logo.avif' | relative_url }}">

  {% if page.date %}
  <meta property="article:published_time" content="{{ page.date | date_to_xmlschema }}">
  <meta property="article:author" content="{{ site.url }}/about/">
  {% endif %}
  {% if page.categories %}
    {% for category in page.categories limit:1 %}
  <meta property="article:section" content="{{ category | escape }}">
    {% endfor %}
  {% endif %}
  {% if page.tags %}
    {% for tag in page.tags %}
  <meta property="article:tag" content="{{ tag | escape }}">
    {% endfor %}
  {% endif %}
</head>
