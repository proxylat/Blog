<header class="site-header">
  <div class="wrapper">
    <a class="site-title" href="{{ site.baseurl }}/">
      <img src="{{ site.baseurl }}/imgs/logo.avif" alt="{{ site.title }}" class="site-logo" fetchpriority="high" width="100" height="100">
      <span class="site-title-text">{{ site.title }}</span>
      <span class="site-tagline">Do it faster.</span>
    </a>
    <nav class="site-nav">
      <div class="trigger">
        {% assign pages_sorted = site.pages | sort: "order" %}
        {% for my_page in pages_sorted %}
          {% if my_page.title %}
            <a class="page-link" href="{{ my_page.url | prepend: site.baseurl }}">{{ my_page.title }}</a>
          {% endif %}
        {% endfor %}
        <button class="theme-toggle" type="button" aria-label="Toggle theme" aria-pressed="false" data-theme-toggle></button>
      </div>
    </nav>
  </div>
</header>
